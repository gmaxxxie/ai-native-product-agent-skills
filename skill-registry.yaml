#   combo        — 跨阶段组合 Skill
#
# status:
#   stable    — 已充实，可直接使用 (>200行，有结构)
#   skeleton  — 骨架，仅有 frontmatter (<100行)
#   thin      — 薄弱，有内容但缺结构 (100-200行)
#
# source_book:
#   ANPM  — 《AI Native 产品方法论》
#   RPN   — 《AI rebuild product needs》
#   CBM   — 《AI确定性商业模式》
